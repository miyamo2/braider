coverage:
  paths:
    - coverage.out
  acceptable: 70%
codeToTestRatio:
  code:
    - '**/*.go'
    - '!pkg/*.go'
    - '!**/*_test.go'
  test:
    - '**/*_test.go'
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
central:
  repository: miyamo2/octocov-central
body:
  if: is_pull_request
summary:
  if: true
