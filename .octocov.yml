coverage:
  if: true
  acceptable: 70%
  exclude:
    - 'github.com/miyamo2/braider/cmd/**/*'
    - 'github.com/miyamo2/braider/pkg/**/*'
  badge:
    path: .assets/coverage.svg
codeToTestRatio:
  code:
    - '**/*.go'
    - '!cmd/*.go'
    - '!pkg/*.go'
    - '!**/*_test.go'
  test:
    - '**/*_test.go'
testExecutionTime:
  if: true
  badge:
    path: .assets/time.svg
comment:
  if: is_pull_request
body:
  if: is_pull_request
summary:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
push:
  if: is_default_branch
  datastores:
    - github://${GITHUB_REPOSITORY}
  message: "Update coverage badges"