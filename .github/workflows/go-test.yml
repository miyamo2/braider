name: Go Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run octocov
        uses: k1LoW/octocov-action@v1.3.0
        env:
          OCTOCOV_CENTRAL_REPOSITORY: miyamo2/octocov-central
          OCTOCOV_GITHUB_TOKEN: ${{ secrets.OCTOCOV_GITHUB_TOKEN || github.token }}

      - name: Upload coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
          retention-days: 30
