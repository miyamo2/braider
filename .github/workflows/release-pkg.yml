name: Release (Package)

on:
  push:
    branches:
      - main
    paths:
      - 'pkg/CHANGELOG.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        id: release
        uses: ./.github/actions/release-common
        with:
          changelog_path: pkg/CHANGELOG.md
          tag_prefix: 'pkg/'
          path_filter: 'pkg'
          branch: main

      - name: Output Release Info
        run: |
          echo "Created release:"
          echo "  Tag: ${{ steps.release.outputs.tag }}"
          echo "  Version: ${{ steps.release.outputs.version }}"
          echo "  URL: ${{ steps.release.outputs.release_url }}"
