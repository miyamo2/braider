name: 'Release Common'
description: 'Common release automation logic for creating tags and GitHub releases from changelog'
inputs:
  changelog_path:
    description: 'Path to the CHANGELOG.md file (e.g., CHANGELOG.md or pkg/CHANGELOG.md)'
    required: true
  tag_prefix:
    description: 'Prefix for the tag (e.g., "" for root, "pkg/" for package)'
    required: false
    default: ''
  path_filter:
    description: 'Path filter for git operations (e.g., "" for root, "pkg" for package)'
    required: false
    default: ''
  branch:
    description: 'Branch to work on'
    required: false
    default: 'main'
outputs:
  tag:
    description: 'The created tag name'
    value: ${{ steps.create-release.outputs.tag }}
  version:
    description: 'The version extracted from changelog'
    value: ${{ steps.extract-version.outputs.version }}
  release_url:
    description: 'URL of the created GitHub release'
    value: ${{ steps.create-release.outputs.release_url }}
runs:
  using: 'composite'
  steps:
    - name: Extract version and notes from changelog
      id: extract-version
      shell: bash
      run: |
        CHANGELOG_PATH="${{ inputs.changelog_path }}"

        if [ ! -f "$CHANGELOG_PATH" ]; then
          echo "❌ Error: Changelog file not found at $CHANGELOG_PATH"
          exit 1
        fi

        # Extract the first version header (## v1.2.3 - 2026-01-28)
        VERSION=$(grep -m 1 '^## v' "$CHANGELOG_PATH" | sed 's/^## v\([^ ]*\).*/\1/')

        if [ -z "$VERSION" ]; then
          echo "❌ Error: No version found in changelog"
          echo "Expected format: ## v1.2.3 - YYYY-MM-DD"
          exit 1
        fi

        # Validate semver format (basic check)
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
          echo "❌ Error: Version '$VERSION' does not follow semantic versioning (x.y.z)"
          echo "Expected format: x.y.z (e.g., 1.2.3)"
          exit 1
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

        # Extract notes (content between first ## and next ##)
        NOTES_FILE="${RUNNER_TEMP}/release-notes-${GITHUB_RUN_ID}.md"
        awk '/^## v/{flag=1; next} /^## /{flag=0} flag' "$CHANGELOG_PATH" > "$NOTES_FILE"

        # Validate that notes were extracted
        if [ ! -s "$NOTES_FILE" ]; then
          echo "⚠️  Warning: No release notes found in changelog for version $VERSION"
          echo "(No changes documented)" > "$NOTES_FILE"
        fi

        # Save notes to a file for later use
        cat "$NOTES_FILE"
        echo "notes-file=$NOTES_FILE" >> $GITHUB_OUTPUT

    - name: Find previous tag
      id: previous-tag
      shell: bash
      run: |
        TAG_PREFIX="${{ inputs.tag_prefix }}"
        CURRENT_VERSION="${{ steps.extract-version.outputs.version }}"

        # Fetch all tags
        git fetch --tags --force

        # Find the most recent tag with the same prefix (excluding the current one)
        if [ -n "$TAG_PREFIX" ]; then
          PATTERN="${TAG_PREFIX}v*"
          # Get all matching tags, sorted by version
          PREV_TAG=$(git tag -l "$PATTERN" | grep -v "^${TAG_PREFIX}v${CURRENT_VERSION}$" | sort -V | tail -n 1)
        else
          # For root, match tags that start with v but exclude tags with /
          PATTERN="v*"
          # Get all matching tags, sorted by version, excluding any with /
          PREV_TAG=$(git tag -l "$PATTERN" | grep -v "/" | grep -v "^v${CURRENT_VERSION}$" | sort -V | tail -n 1)
        fi

        if [ -n "$PREV_TAG" ]; then
          echo "previous-tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Found previous tag: $PREV_TAG"

          # Get the date of the previous tag
          TAG_DATE=$(git log -1 --format=%ai "$PREV_TAG")
          echo "previous-tag-date=$TAG_DATE" >> $GITHUB_OUTPUT
          echo "Previous tag date: $TAG_DATE"
        else
          echo "No previous tag found"
          echo "previous-tag=" >> $GITHUB_OUTPUT
          echo "previous-tag-date=" >> $GITHUB_OUTPUT
        fi

    - name: Build tag name
      id: build-tag
      shell: bash
      run: |
        TAG_PREFIX="${{ inputs.tag_prefix }}"
        VERSION="${{ steps.extract-version.outputs.version }}"
        TAG="${TAG_PREFIX}v${VERSION}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Built tag name: $TAG"

    - name: Validate tag
      id: validate-tag
      uses: ./.github/actions/validate-tag
      with:
        tag: ${{ steps.build-tag.outputs.tag }}
        allow_overwrite: 'false'

    - name: Create and push tag
      id: create-tag
      shell: bash
      run: |
        TAG="${{ steps.build-tag.outputs.tag }}"

        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Creating tag: $TAG"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "Release $TAG"

        # Push tag with error handling
        if ! git push origin "$TAG"; then
          echo "❌ Error: Failed to push tag $TAG"
          echo "This usually means the tag already exists on remote or there was a network issue"
          echo "If the tag exists, update the version in the changelog"
          exit 1
        fi

        echo "✅ Successfully created and pushed tag $TAG"

    - name: Create GitHub Release
      id: create-release
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const tagPrefix = '${{ inputs.tag_prefix }}';
          const pathFilter = '${{ inputs.path_filter }}';
          const version = '${{ steps.extract-version.outputs.version }}';
          const tag = '${{ steps.create-tag.outputs.tag }}';
          const previousTag = '${{ steps.previous-tag.outputs.previous-tag }}';
          const previousTagDate = '${{ steps.previous-tag.outputs.previous-tag-date }}';
          const notesFile = '${{ steps.extract-version.outputs.notes-file }}';

          // Read release notes
          const releaseNotes = fs.readFileSync(notesFile, 'utf8').trim();

          // Collect contributors using git log with path filtering
          let contributors = [];
          if (previousTag) {
            const { execSync } = require('child_process');

            // Build git log command with path filter
            let gitCmd = `git log ${previousTag}..HEAD --format=%aN`;
            if (pathFilter) {
              gitCmd += ` -- ${pathFilter}`;
            }

            try {
              const output = execSync(gitCmd, { encoding: 'utf8' });
              const authorNames = new Set(output.split('\n').filter(line => line.trim()));

              // For each author name, try to find their GitHub login
              // We'll use the GitHub API to map commit authors to logins
              for (const authorName of authorNames) {
                // Escape double quotes in author name to prevent command injection
                const escapedAuthor = authorName.replace(/"/g, '\\"');
                // Search commits for this author to get their login
                const searchCmd = `git log ${previousTag}..HEAD --author="${escapedAuthor}" --format=%H -1`;
                const commitSha = execSync(searchCmd, { encoding: 'utf8' }).trim();

                if (commitSha) {
                  try {
                    const commit = await github.rest.repos.getCommit({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: commitSha,
                    });
                    if (commit.data.author && commit.data.author.login) {
                      contributors.push(commit.data.author.login);
                    }
                  } catch (error) {
                    console.log(`Could not fetch GitHub login for ${authorName}`);
                  }
                }
              }
              contributors = Array.from(new Set(contributors)).sort();
            } catch (error) {
              console.log('Error collecting contributors:', error.message);
            }
          }

          // Build diff URL
          // Note: GitHub's compare view doesn't support path filtering via query parameters
          // The URL will show all changes; users need to manually filter by path in the UI
          let diffUrl;
          if (previousTag) {
            diffUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${previousTag}...${tag}`;
          } else {
            diffUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${tag}`;
            if (pathFilter) {
              diffUrl += `/${pathFilter}`;
            }
          }

          // Build release body
          let body = '## Changes\n\n';
          body += releaseNotes;
          body += '\n\n## Contributors\n\n';
          if (contributors.length > 0) {
            body += contributors.map(login => `- @${login}`).join('\n');
          } else {
            body += '- (none)';
          }
          body += '\n\n## Diff\n\n';
          body += diffUrl;

          // Create or update the release
          let release;
          try {
            // Check if release already exists
            const existingRelease = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });

            // If release exists, update it
            console.log(`Release for tag ${tag} already exists, updating...`);
            release = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: existingRelease.data.id,
              tag_name: tag,
              name: tag,
              body: body,
              draft: false,
              prerelease: false,
            });
          } catch (error) {
            if (error.status === 404) {
              // Release doesn't exist, create it
              console.log(`Creating new release for tag ${tag}...`);
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: body,
                draft: false,
                prerelease: false,
              });
            } else {
              throw error;
            }
          }

          core.setOutput('tag', tag);
          core.setOutput('release_url', release.data.html_url);
          core.setOutput('version', version);

          console.log(`Created release: ${release.data.html_url}`);
