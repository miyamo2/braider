name: 'Validate Tag'
description: 'Validates that a tag does not already exist to prevent overwriting'
inputs:
  tag:
    description: 'Tag name to validate (e.g., v1.2.3 or pkg/v1.2.3)'
    required: true
  allow_overwrite:
    description: 'Allow overwriting existing tags (default: false)'
    required: false
    default: 'false'
outputs:
  exists:
    description: 'Whether the tag already exists (true/false)'
    value: ${{ steps.check.outputs.exists }}
  tag:
    description: 'The validated tag name'
    value: ${{ inputs.tag }}
runs:
  using: 'composite'
  steps:
    - name: Check if tag exists
      id: check
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"
        ALLOW_OVERWRITE="${{ inputs.allow_overwrite }}"

        echo "Validating tag: $TAG"

        # Fetch all tags to ensure we have the latest
        git fetch --tags --force

        # Check if tag exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "⚠️  Tag $TAG already exists"

          if [ "$ALLOW_OVERWRITE" != "true" ]; then
            echo "❌ Error: Tag $TAG already exists and overwriting is not allowed"
            echo "To release a new version, update the version in the changelog"
            exit 1
          else
            echo "⚠️  Warning: Overwriting existing tag $TAG (allow_overwrite=true)"
          fi
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "✅ Tag $TAG does not exist, safe to create"
        fi
